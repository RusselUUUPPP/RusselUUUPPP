<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriKos - Profil Saya</title>
    <!-- Font Awesome untuk ikon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Hubungkan ke file CSS utama -->
    <link rel="stylesheet" href="style.css">
    
    
    <!-- Style Khusus Halaman Profil -->
    <style>
        .header-green-profile {
            background-color: var(--primary);
            color: var(--white);
            padding: 40px 24px 60px 24px; /* Padding bawah lebih panjang untuk efek overlap */
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 0 0 24px 24px;
            position: relative;
            z-index: 10;
        }
        .header-green-profile h1 { font-size: 18px; font-weight: 600; }
        .header-green-profile .icon-btn { color: var(--white); font-size: 20px; text-decoration: none; }

        .content-profile {
            padding: 0 20px 100px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            margin-top: -35px; /* Mengangkat konten agar menumpuk di atas header hijau */
        }

        /* Kartu Identitas Utama */
        .profile-card {
            background-color: var(--white);
            border-radius: 16px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            z-index: 20;
        }
        .profile-img-large {
            width: 86px; height: 86px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-light);
            margin-bottom: 12px;
        }
        .profile-name { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
        .profile-email { font-size: 12px; color: var(--text-gray); margin-bottom: 16px; }
        .btn-edit-profile {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-edit-profile:hover { background-color: #dcfce7; }

        /* Grid TB & BB */
        .stats-grid-profile {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat-box-profile {
            background-color: var(--white);
            border-radius: 16px;
            padding: 16px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f3f4f6;
            text-align: center;
        }
        .stat-icon {
            width: 36px; height: 36px;
            background-color: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .stat-label { font-size: 11px; color: var(--text-gray); font-weight: 500; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--text-dark); }
        .stat-value span { font-size: 11px; font-weight: 500; color: var(--text-gray); margin-left: 2px;}

        /* List Menu Pengaturan */
        .menu-list-profile {
            background-color: var(--white);
            border-radius: 16px;
            padding: 8px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid #f3f4f6;
            display: flex;
            flex-direction: column;
        }
        .menu-item-profile {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f3f4f6;
            text-decoration: none;
            color: var(--text-dark);
        }
        .menu-item-profile:last-child { border-bottom: none; }
        .menu-icon {
            width: 34px; height: 34px;
            background-color: #f3f4f6;
            color: var(--text-gray);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            margin-right: 14px;
        }
        .menu-text { flex: 1; font-size: 14px; font-weight: 600; }
        .menu-arrow { color: #d1d5db; font-size: 14px; }
        
        /* Khusus Tombol Keluar */
        .menu-item-profile.logout .menu-icon { background-color: #fee2e2; color: #ef4444; }
        .menu-item-profile.logout .menu-text { color: #ef4444; }
    </style>
</head>
<script src="script.js"></script>
<body>

    <div class="mobile-container">
        
        <!-- HEADER HIJAU -->
        <header class="header-green-profile">
            <a href="dashboard.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Profil Saya</h1>
            <a href="#" class="icon-btn"><i class="fa-solid fa-bell"></i></a>
        </header>

        <!-- KONTEN UTAMA -->
        <main class="content-profile">
            
            <!-- Kartu Identitas (Foto, Nama, Email) -->
            <div class="profile-card">
                <img src="img/profile.webp" alt="Profile" class="profile-img-large">
                <h2 class="profile-name">Oline Manuel</h2>
                <p class="profile-email">oline.manuel@gmail.com</p>
                <a href="#" class="btn-edit-profile">Edit Profil</a>
            </div>

            <!-- Grid Data Fisik (BB, TB, IMT) -->
            <div class="stats-grid-profile">
                <!-- Berat Badan -->
                <div class="stat-box-profile">
                    <div class="stat-icon"><i class="fa-solid fa-weight-scale"></i></div>
                    <p class="stat-label">Berat Badan</p>
                    <p class="stat-value">55 <span>kg</span></p>
                </div>
                <!-- Tinggi Badan -->
                <div class="stat-box-profile">
                    <div class="stat-icon"><i class="fa-solid fa-ruler-vertical"></i></div>
                    <p class="stat-label">Tinggi Badan</p>
                    <p class="stat-value">162 <span>cm</span></p>
                </div>
                <!-- IMT (Indeks Massa Tubuh) -->
                <div class="stat-box-profile">
                    <div class="stat-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                    <p class="stat-label">Skor IMT</p>
                    <p class="stat-value">21.0 <span>(Ideal)</span></p>
                </div>
            </div>

            <!-- Menu Pengaturan -->
            <div class="menu-list-profile">
                <a href="#" class="menu-item-profile">
                    <div class="menu-icon"><i class="fa-regular fa-user"></i></div>
                    <span class="menu-text">Data Pribadi</span>
                    <i class="fa-solid fa-chevron-right menu-arrow"></i>
                </a>
                <a href="#" class="menu-item-profile">
                    <div class="menu-icon"><i class="fa-solid fa-bullseye"></i></div>
                    <span class="menu-text">Target & Preferensi Diet</span>
                    <i class="fa-solid fa-chevron-right menu-arrow"></i>
                </a>
                <a href="#" class="menu-item-profile">
                    <div class="menu-icon"><i class="fa-regular fa-credit-card"></i></div>
                    <span class="menu-text">Langganan NutriKos+</span>
                    <i class="fa-solid fa-chevron-right menu-arrow"></i>
                </a>
                <a href="#" class="menu-item-profile">
                    <div class="menu-icon"><i class="fa-solid fa-gear"></i></div>
                    <span class="menu-text">Pengaturan Akun</span>
                    <i class="fa-solid fa-chevron-right menu-arrow"></i>
                </a>
            </div>

            <!-- Tombol Keluar -->
            <div class="menu-list-profile">
                <a href="index.html" class="menu-item-profile logout">
                    <div class="menu-icon"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
                    <span class="menu-text">Keluar Akun</span>
                </a>
            </div>

        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Beranda</span>
            </a>
            <a href="rekomendasi.html" class="nav-item">
                <i class="fa-regular fa-heart"></i>
                <span>Rekomendasi</span>
            </a>
            
            <div class="nav-item-center">
                <div class="center-btn">
                    <i class="fa-solid fa-leaf"></i>
                </div>
            </div>
            
            <a href="#" class="nav-item">
                <i class="fa-regular fa-clock"></i>
                <span>Riwayat</span>
            </a>
            <!-- Navigasi Aktif untuk Profil -->
            <a href="profile.html" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span>Profil</span>
            </a>
        </nav>

    </div>

</body>
</html>
