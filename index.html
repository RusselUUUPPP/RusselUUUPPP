<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriKos - Masuk</title>
    <!-- Font Awesome untuk ikon/status bar jika diperlukan -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-container login-page">
        

        <!-- Upper Section: Logo & Hero Illustration -->
        <div class="hero-section">
            <!-- Logo area -->
            <div class="logo-container">
                <div class="logo-icon-main">
                    <i class="fa-solid fa-leaf"></i>
                </div>
                <h1 class="logo-title">Nutri<span>Kos</span></h1>
                <p class="logo-tagline">Nutrisi Praktis, Hidup Lebih Sehat</p>
            </div>

            <!-- Hero Image Illustration Placeholder -->
            <div class="hero-image-wrapper">
                <img src="https://images.unsplash.com/photo-1540420773420-3366772f4999?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="NutriKos Illustration" class="hero-img">
            </div>
        </div>

        <!-- Lower Section: Interactive White Card -->
        <div class="auth-card">
            <p class="auth-headline">Nutrisi seimbang, hidup lebih produktif.</p>

            <!-- Action Buttons -->
            <div class="auth-action-group">
                <button class="btn-primary-nutri" onclick="location.href='dashboard.html'">Masuk / Daftar</button>
                <button class="btn-secondary-nutri" onclick="location.href='dashboard.html'">Lanjut sebagai Tamu</button>
            </div>

            <!-- Privacy Policy & Terms Footer -->
            <p class="auth-footer-text">
                Dengan masuk, kamu menyetujui<br>
                <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a>
            </p>
        </div>

        <!-- Bottom Wave Deco Decor -->
        <div class="bottom-wave-deco"></div>

    </div>

</body>
</html>
